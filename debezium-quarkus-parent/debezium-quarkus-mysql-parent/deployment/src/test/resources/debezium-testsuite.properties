debezium.offset.storage=org.apache.kafka.connect.storage.MemoryOffsetBackingStore
debezium.schema.history.internal=io.debezium.relational.history.MemorySchemaHistory
debezium.name=test
debezium.topic.prefix=topic
debezium.topic.naming.strategy=io.debezium.schema.DefaultTopicNamingStrategy
debezium.database.names=inventory
debezium.snapshot.mode=initial
debezium.capturing.orders.destination=topic.inventory.orders
debezium.include.schema.changes=false
debezium.heartbeat.interval.ms=5
debezium.database.server.id=12345

quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${MYSQL_USERNAME}
quarkus.datasource.password=${MYSQL_PASSWORD}

quarkus.datasource.jdbc.url=${MYSQL_JDBC}
quarkus.datasource.jdbc.max-size=16

